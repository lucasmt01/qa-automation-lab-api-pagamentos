name: API Tests

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  api-tests:
    name: Run API automation tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      API_PORT: 3000
      API_TOKEN: qa-lab-token
      MONGO_URI: mongodb://localhost:27017
      MONGO_DATABASE: qa_lab_payments
      BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm ci

      - name: Install fake API dependencies
        run: npm --prefix fake-api ci

      - name: Build fake API
        run: npm run api:build

      - name: Start fake API
        run: |
          npm run api:dev > api.log 2>&1 &

      - name: Wait for API health check
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:3000/health | grep "UP"; then
              echo "API is ready"
              exit 0
            fi

            echo "Waiting for API..."
            sleep 2
          done

          echo "API did not start in time"
          cat api.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test tests/api tests/database

      - name: Run Postman collection with Newman
        run: npm run postman:test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright-report
          if-no-files-found: ignore

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
          if-no-files-found: ignore